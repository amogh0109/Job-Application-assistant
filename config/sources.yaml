  # ---------- SECONDARY: aggregators (fallback) ----------
  - id: linkedin
    type: linkedin_search
    enabled: false               # turn on after ATS layer stabilizes (anti-bot risk)
    auth: { mode: session_cookie, cookie_env: LINKEDIN_COOKIE }
    filters:
      titles_include: ["AI","Machine Learning","Data Scientist","ML Engineer","AI Engineer","Research Engineer","NLP"]
      posted_within_days: 21
      remote_types: ["Remote","Hybrid"]
      locations_include: ["United States"]

  - id: indeed
    type: indeed_search
    enabled: false
    filters:
      query: ["(AI OR \"machine learning\" OR NLP OR \"deep learning\") (engineer OR scientist OR research)"]
      locations_include: ["United States"]
      posted_within_days: 21

  # ---------- NICHE / YOUR ORIGINAL ----------
  - id: rss_weworkremotely_programming
    type: rss
    enabled: false
    feeds:
      - "https://weworkremotely.com/categories/remote-programming-jobs.rss"
    parse:
      posted_date_fields: ["pubDate","published","updated"]
      html_to_text: true
    normalize:
      title_field: "title"
      location_default: "Remote"
    pagination: { page_size: 200 }
